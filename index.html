<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <script defer src="index.js"></script>
</head>
<body>
    <h1>Shopping List</h1>
    <label for="itemInput">Item:</label>
    <input id="itemInput" type="text" placeholder="Enter item" />
    <button id="addItemButton">Add Item</button>
    <button id="removeLastButton">Remove Last Item</button>

    <ul id="shoppingListUI"></ul>

    <script>
        // DOM elements
        const itemInput = document.getElementById('itemInput');
        const addItemButton = document.getElementById('addItemButton');
        const removeLastButton = document.getElementById('removeLastButton');
        const shoppingListUI = document.getElementById('shoppingListUI');

        // Function to update the displayed list
        function updateUI() {
            shoppingListUI.innerHTML = '';
            shoppingList.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                shoppingListUI.appendChild(li);
            });
        }

        // Add item button click handler
        addItemButton.addEventListener('click', () => {
            const item = itemInput.value.trim();
            if (item) {
                addItem(item);
                itemInput.value = '';
                updateUI();
            }
        });

        // Remove last item button click handler
        removeLastButton.addEventListener('click', () => {
            removeLastItem();
            updateUI();
        });

        // Initial UI render
        updateUI();
    </script>
</body>
</html>
